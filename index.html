<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쇼피 글로벌 마진 계산기 V2.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --shopee-orange: #EE4D2D;
            --shopee-orange-hover: #ff5733;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --table-header: #f8f9fa;
            --input-bg: #ffffff;
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333333;
            --table-header: #2c2c2c;
            --input-bg: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; transition: background 0.2s, color 0.2s; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 12px; font-size: 13px; -webkit-text-size-adjust: none; }
        
        .header { background: var(--card-bg); padding: 12px 15px; border-radius: 8px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; border-top: 4px solid var(--shopee-orange); flex-wrap: wrap; gap: 8px; }
        .header h1 { font-size: 16px; color: var(--shopee-orange); display: flex; align-items: center; gap: 6px; }
        
        .theme-toggle-btn { background: var(--shopee-orange); color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* PC 버전 기본 레이아웃: 좌우 배치 */
        .main-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 12px; margin-bottom: 12px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .card h2 { font-size: 14px; margin-bottom: 12px; color: var(--shopee-orange); display: flex; align-items: center; gap: 6px; }

        .grid-inputs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .country-setting { border: 1px solid var(--border-color); padding: 6px; border-radius: 6px; background: var(--input-bg); }
        .country-setting label { font-weight: bold; font-size: 11px; display: block; margin-bottom: 4px; opacity: 0.8; }
        .input-group { display: flex; align-items: center; gap: 4px; }
        .input-group input { width: 100%; padding: 5px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 11px; text-align: right; background: var(--input-bg); color: var(--text-color); }
        
        .common-setting { margin-top: 12px; padding: 10px; background: rgba(238, 77, 45, 0.05); border-radius: 6px; display: flex; gap: 15px; justify-content: center; }
        .common-setting .form-group { display: flex; align-items: center; gap: 6px; }

        .rate-list { display: grid; grid-template-columns: 1fr; gap: 4px; }
        .rate-item { display: flex; justify-content: space-between; padding: 5px 8px; border-bottom: 1px solid var(--border-color); font-size: 12px; }

        .calc-section { background: var(--card-bg); padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* 국가 버튼 스크롤 최적화 */
        .country-selector { display: flex; gap: 6px; margin: 10px 0; overflow-x: auto; padding-bottom: 6px; -webkit-overflow-scrolling: touch; }
        .country-btn { flex: 0 0 auto; padding: 6px 12px; border: 1px solid var(--border-color); background: var(--input-bg); border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--text-color); font-weight: 500; }
        .country-btn.active { background: var(--shopee-orange); color: white; border-color: var(--shopee-orange); font-weight: bold; }

        /* 입력 폼 배치 */
        .calc-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .calc-inputs .form-group { display: flex; flex-direction: column; gap: 4px; }
        .calc-inputs label { font-weight: bold; font-size: 11px; color: var(--shopee-orange); }
        .calc-inputs input { padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; text-align: right; background: var(--input-bg); color: var(--text-color); font-weight: bold; font-size: 12px; width: 100%; }

        .analysis-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .analysis-table th, .analysis-table td { border: 1px solid var(--border-color); padding: 8px; font-size: 12px; }
        .analysis-table th { background: var(--table-header); text-align: left; width: 45%; }
        .analysis-table td { text-align: right; }
        .result-row { background: rgba(238, 77, 45, 0.1); font-weight: bold; font-size: 14px; color: var(--shopee-orange); }

        .summary-cards { display: flex; gap: 8px; margin-bottom: 15px; }
        .summary-box { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); padding: 8px; border-radius: 6px; text-align: center; }
        .summary-box.active { border: 1px solid var(--shopee-orange); background: rgba(238, 77, 45, 0.02); }
        .summary-box .title { font-size: 10px; opacity: 0.7; margin-bottom: 2px; }
        .summary-box .value { font-size: 13px; font-weight: bold; }

        /* 비교 테이블 가로 스크롤 감싸기 */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--border-color); border-radius: 6px; }
        .comparison-table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
        .comparison-table th { background: var(--table-header); border-bottom: 2px solid var(--border-color); padding: 8px; color: var(--shopee-orange); }
        .comparison-table td { border-bottom: 1px solid var(--border-color); padding: 8px; text-align: center; }
        
        .btn-refresh { width: 100%; padding: 10px; background: var(--shopee-orange); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; margin-top: 10px; }

        /* ==========================================================================
           📱 모바일 최적화 반응형 CSS (스마트폰용 화면 정의)
           ========================================================================== */
        @media (max-width: 76ined-width: 768px) or (max-device-width: 768px) {
            body { padding: 8px; }
            .header { padding: 10px; justify-content: center; flex-direction: column; text-align: center; }
            
            /* 좌우 배치를 강제로 상하 배치로 수정 */
            .main-container { grid-template-columns: 1fr; gap: 10px; }
            .grid-inputs { grid-template-columns: repeat(2, 1fr); }
            
            /* 입력창 4단 배열을 모바일에서는 2단 배열로 쪼갬 */
            .calc-inputs { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            
            /* 모바일 버튼 터치하기 쉽게 확장 */
            .country-btn { padding: 8px 14px; font-size: 13px; }
            
            /* 요약 카드 글자 정렬 */
            .summary-box .value { font-size: 12px; }
            
            /* 가독성을 위해 표 내용 축소 방지 */
            .analysis-table th, .analysis-table td { padding: 7px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-cart-shopping"></i> 쇼피 글로벌 마진 계산기 V2.5</h1>
        <div style="display: flex; align-items: center; gap: 10px; justify-content: center; width: 100%; max-width: 300px;">
            <button class="theme-toggle-btn" onclick="toggleTheme()">
                <i class="fa-solid fa-circle-half-stroke"></i> 다크/라이트 모드
            </button>
        </div>
    </div>

    <div class="main-container">
        <div class="card">
            <h2><i class="fa-solid fa-gears"></i> 나라별 수수료 설정</h2>
            <div class="grid-inputs" id="countrySettingsContainer"></div>
            <div class="common-setting">
                <div class="form-group">
                    <label>Payoneer:</label>
                    <input type="number" id="payoneerFee" value="1.2" style="width:40px; text-align:center; border:1px solid var(--border-color); background:var(--input-bg); color:var(--text-color);"> %
                </div>
                <div class="form-group">
                    <label>PG 수수료:</label>
                    <input type="number" id="pgFee" value="3.0" style="width:40px; text-align:center; border:1px solid var(--border-color); background:var(--input-bg); color:var(--text-color);"> %
                </div>
            </div>
            <button class="btn-refresh" onclick="calculateAll()">데이터 새로고침</button>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-sack-dollar"></i> 현재 환율 (1 KRW 기준)</h2>
            <div class="rate-list" id="exchangeRateContainer"></div>
        </div>
    </div>

    <div class="calc-section">
        <h2><i class="fa-solid fa-calculator"></i> 마진 상세 계산</h2>
        <div class="country-selector" id="countrySelector"></div>

        <div class="calc-inputs">
            <div class="form-group">
                <label>매입 원가 (KRW)</label>
                <input type="number" id="costKrw" value="5000" oninput="calculateAll()">
            </div>
            <div class="form-group">
                <label>상품 무게 (g)</label>
                <input type="number" id="weightG" value="200" oninput="calculateAll()">
            </div>
            <div class="form-group">
                <label>국내 배송비 (KRW)</label>
                <input type="number" id="localShippingKrw" value="1000" oninput="calculateAll()">
            </div>
            <div class="form-group">
                <label>현지 판매가</label>
                <input type="number" id="priceLocal" value="350" oninput="calculateAll()">
            </div>
        </div>

        <table class="analysis-table">
            <tr>
                <th>현지 판매가</th>
                <td id="tablePriceLocal" style="color:var(--shopee-orange); font-weight:bold;">-</td>
            </tr>
            <tr>
                <th>- 쇼피 수수료 (플랫폼+서비스)</th>
                <td id="tableShopeeFee">-</td>
            </tr>
            <tr>
                <th>- 결제 수수료 (PG + Payoneer)</th>
                <td id="tablePgPayoneerFee">-</td>
            </tr>
            <tr>
                <th>정산금액 (현지통화)</th>
                <td id="tableSettlementLocal">-</td>
            </tr>
            <tr style="border-top: 1px dashed var(--shopee-orange);">
                <th>정산금액 (KRW 환산)</th>
                <td id="tableSettlementKrw" style="color:#2196F3; font-weight:bold;">-</td>
            </tr>
            <tr>
                <th>- 원가 + 국내 배송비</th>
                <td id="tableTotalBaseCost">-</td>
            </tr>
            <tr>
                <th>- 국제 배송비 (KRW)</th>
                <td id="tableIntlShippingKrw">-</td>
            </tr>
            <tr class="result-row">
                <th>최종 순이익 (KRW)</th>
                <td id="tableFinalProfit">-</td>
            </tr>
        </table>

        <div class="summary-cards">
            <div class="summary-box"><div class="title">국제 배송비</div><div id="sumIntlShip" class="value">-</div></div>
            <div class="summary-box active"><div class="title">예상 이익</div><div id="sumProfitKrw" class="value" style="color:var(--shopee-orange)">-</div></div>
            <div class="summary-box"><div class="title">마진율</div><div id="sumMarginRate" class="value">-</div></div>
        </div>

        <h2 style="margin-bottom: 8px;"><i class="fa-solid fa-chart-line"></i> 나라별 마진 비교 (동일 조건)</h2>
        <div class="table-responsive">
            <table class="comparison-table">
                <thead>
                    <tr>
                        <th>국가</th>
                        <th>판매가</th>
                        <th>정산액</th>
                        <th>환율</th>
                        <th>정산(KRW)</th>
                        <th>배송비(KRW)</th>
                        <th>최종이익</th>
                        <th>마진율</th>
                    </tr>
                </thead>
                <tbody id="comparisonTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const countries = {
            TH: { name: '태국', currency: 'THB', rate: 0.026100, fee: 13.35 },
            SG: { name: '싱가포르', currency: 'SGD', rate: 0.000971, fee: 13.35 },
            MY: { name: '말레이시아', currency: 'MYR', rate: 0.003380, fee: 13.35 },
            VN: { name: '베트남', currency: 'VND', rate: 18.250000, fee: 13.35 },
            TW: { name: '대만', currency: 'TWD', rate: 0.023300, fee: 12.5 },
            PH: { name: '필리핀', currency: 'PHP', rate: 0.042100, fee: 12.5 },
            BR: { name: '브라질', currency: 'BRL', rate: 0.003920, fee: 15.0 },
            MX: { name: '멕시코', currency: 'MXN', rate: 0.013100, fee: 15.0 }
        };

        let currentCountryCode = 'TH';

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        function init() {
            const settingsContainer = document.getElementById('countrySettingsContainer');
            const rateContainer = document.getElementById('exchangeRateContainer');
            const selectorContainer = document.getElementById('countrySelector');

            settingsContainer.innerHTML = '';
            rateContainer.innerHTML = '';
            selectorContainer.innerHTML = '';

            Object.keys(countries).forEach(code => {
                const c = countries[code];
                settingsContainer.innerHTML += `
                    <div class="country-setting">
                        <label>${c.name} (${c.currency})</label>
                        <div class="input-group">
                            <input type="number" id="fee_${code}" value="${c.fee}" step="0.1" oninput="calculateAll()"> %
                        </div>
                    </div>
                `;
                rateContainer.innerHTML += `
                    <div class="rate-item">
                        <span>📌 ${c.name}</span>
                        <span><b>${c.rate.toFixed(6)}</b></span>
                    </div>
                `;
                selectorContainer.innerHTML += `
                    <button class="country-btn ${code === currentCountryCode ? 'active' : ''}" id="btn_${code}" onclick="selectCountry('${code}')">${c.name}</button>
                `;
            });
            calculateAll();
        }

        function selectCountry(code) {
            currentCountryCode = code;
            document.querySelectorAll('.country-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn_${code}`).classList.add('active');
            calculateAll();
        }

        function calculateAll() {
            const costKrw = parseFloat(document.getElementById('costKrw').value) || 0;
            const weightG = parseFloat(document.getElementById('weightG').value) || 0;
            const localShippingKrw = parseFloat(document.getElementById('localShippingKrw').value) || 0;
            const priceLocalInput = parseFloat(document.getElementById('priceLocal').value) || 0;
            const payoneerRate = (parseFloat(document.getElementById('payoneerFee').value) || 0) / 100;
            const pgRate = (parseFloat(document.getElementById('pgFee').value) || 0) / 100;
            const intlShippingKrw = (weightG * 10) + 388; // 기존 배송비 수식 유지

            const tbody = document.getElementById('comparisonTableBody');
            tbody.innerHTML = '';

            Object.keys(countries).forEach(code => {
                const c = countries[code];
                const feeRate = (parseFloat(document.getElementById(`fee_${code}`).value) || c.fee) / 100;
                
                let priceLocal = priceLocalInput;
                if (code !== currentCountryCode) {
                    const baseKrw = priceLocalInput / countries[currentCountryCode].rate;
                    priceLocal = Math.round(baseKrw * c.rate);
                }

                const shopeeFee = priceLocal * feeRate;
                const pgPayoneerFee = priceLocal * (payoneerRate + pgRate);
                const settlementLocal = priceLocal - shopeeFee - pgPayoneerFee;
                const settlementKrw = Math.round(settlementLocal / c.rate);
                const finalProfitKrw = settlementKrw - costKrw - localShippingKrw - intlShippingKrw;
                const marginRate = settlementKrw > 0 ? ((finalProfitKrw / settlementKrw) * 100).toFixed(1) : 0;

                if (code === currentCountryCode) {
                    document.getElementById('tablePriceLocal').innerText = `${priceLocal.toLocaleString()} ${c.currency}`;
                    document.getElementById('tableShopeeFee').innerText = `${Math.round(shopeeFee).toLocaleString()} ${c.currency}`;
                    document.getElementById('tablePgPayoneerFee').innerText = `${Math.round(pgPayoneerFee).toLocaleString()} ${c.currency}`;
                    document.getElementById('tableSettlementLocal').innerText = `${Math.round(settlementLocal).toLocaleString()} ${c.currency}`;
                    document.getElementById('tableSettlementKrw').innerText = `${settlementKrw.toLocaleString()} KRW`;
                    document.getElementById('tableTotalBaseCost').innerText = `${(costKrw + localShippingKrw).toLocaleString()} KRW`;
                    document.getElementById('tableIntlShippingKrw').innerText = `${Math.round(intlShippingKrw).toLocaleString()} KRW`;
                    document.getElementById('tableFinalProfit').innerText = `${finalProfitKrw.toLocaleString()} KRW`;
                    
                    document.getElementById('sumIntlShip').innerText = `${Math.round(intlShippingKrw * c.rate).toLocaleString()} ${c.currency}`;
                    document.getElementById('sumProfitKrw').innerText = `${finalProfitKrw.toLocaleString()} KRW`;
                    document.getElementById('sumMarginRate').innerText = `${marginRate}%`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td><b>${c.name}</b></td>
                        <td>${priceLocal.toLocaleString()}</td>
                        <td>${Math.round(settlementLocal).toLocaleString()}</td>
                        <td>${c.rate.toFixed(5)}</td>
                        <td>${settlementKrw.toLocaleString()}</td>
                        <td>${Math.round(intlShippingKrw).toLocaleString()}</td>
                        <td style="font-weight:bold; color:${finalProfitKrw >= 0 ? '#EE4D2D' : '#d32f2f'}">${finalProfitKrw.toLocaleString()}</td>
                        <td style="font-weight:bold;">${marginRate}%</td>
                    </tr>
                `;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
